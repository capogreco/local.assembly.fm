<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>local.assembly.fm</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: "IBM Plex Mono", "Fira Mono", "Courier New", monospace;
      height: 100dvh;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    #scope {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      touch-action: none;
    }
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      background: #1a1a1a;
    }
    #overlay span {
      font-size: 1.4rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #888;
    }
    #overlay.hidden { display: none; }
    #status-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0.8rem 1rem;
      font-size: 0.75rem;
      color: #555;
      display: flex;
      justify-content: space-between;
      letter-spacing: 0.1em;
    }
    #status-bar { z-index: 5; }
    #browser-hint { color: #555; cursor: pointer; }
    #status-bar.connected { color: #666; }
    #status-bar.disconnected { color: #444; }
    #param-display {
      position: fixed; top: 10px; left: 10px;
      font-family: "IBM Plex Mono", monospace; font-size: 11px;
      color: #666; white-space: pre; z-index: 5;
    }
    #touch-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 8;
      background: rgba(220, 100, 140, 0.85);
      font-size: 1.4rem;
      color: #fff;
      letter-spacing: 0.15em;
      text-align: center;
      padding: 2rem;
      touch-action: none;
    }
    #touch-overlay.hidden { display: none; }
  </style>
</head>
<body>
  <canvas id="scope"></canvas>
  <div id="overlay">
    <span>tap to start</span>
  </div>
  <div id="touch-overlay" class="hidden"></div>
  <div id="param-display"></div>
  <div id="status-bar" class="disconnected">
    <span id="conn-status">disconnected</span>
    <span id="client-count"></span>
    <span id="browser-hint" onclick="fetch('/auth');navigator.clipboard.writeText('https://local.assembly.fm').then(()=>{this.textContent='copied!';setTimeout(()=>{this.textContent='local.assembly\u200B.fm'},1500)})">local.assembly​.fm</span>
  </div>
  <script src="graph-core.js"></script>
  <script src="graph.js"></script>
  <script src="connection.js"></script>
  <script src="scope.js"></script>
  <script src="main.js"></script>
</body>
</html>
