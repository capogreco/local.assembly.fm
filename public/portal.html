<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>assembly</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: "IBM Plex Mono", "Fira Mono", "Courier New", monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      gap: 2rem;
      text-align: center;
    }
    h1 {
      font-size: 1.2rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #888;
    }
    a {
      font-size: 1.3rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #e0e0e0;
      text-decoration: none;
      padding: 1.5rem 2rem;
      border: 1px solid #444;
      display: block;
    }
    a:active { color: #fff; border-color: #888; }
    .hint {
      font-size: 0.8rem;
      color: #555;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <h1>assembly</h1>
  <a id="open" href="#">tap to join</a>
  <p class="hint" id="fallback" style="display:none">
    if nothing happens, dismiss this<br>and open <span style="color:#888">local.assembly.fm</span> in your browser
  </p>
  <!-- silent auth ping so WiFi stays connected after CNA dismisses -->
  <img src="/auth" style="display:none" alt="">
  <script>
    const host = location.hostname;
    const link = document.getElementById("open");

    // Try intent URI to escape Android CNA webview into real browser
    // Falls back to direct link (works if already in a real browser, or iOS)
    if (/android/i.test(navigator.userAgent)) {
      link.href = "intent://" + host + "/#Intent;scheme=https;end";
      // If intent doesn't work (e.g. Firefox), fall back to direct navigation
      link.addEventListener("click", function(e) {
        setTimeout(function() {
          // If we're still here after 500ms, intent didn't launch — navigate directly
          window.location.href = "https://" + host + "/";
        }, 500);
      });
    } else {
      link.href = "https://" + host + "/";
    }
  </script>
</body>
</html>
