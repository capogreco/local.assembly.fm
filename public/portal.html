<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>assembly</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: "IBM Plex Mono", "Fira Mono", "Courier New", monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      gap: 2rem;
      text-align: center;
    }
    h1 {
      font-size: 1.2rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #888;
    }
    p {
      font-size: 0.95rem;
      color: #666;
      line-height: 1.8;
      letter-spacing: 0.1em;
    }
    .url {
      color: #e0e0e0;
      font-size: 1.3rem;
      letter-spacing: 0.15em;
    }
    .hint {
      font-size: 0.8rem;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>assembly</h1>
  <p>tap <span style="color:#e0e0e0">Done</span> above<br>then open your browser</p>
  <p class="url">local.assembly.fm</p>
  <!-- silent auth ping so WiFi stays connected after CNA dismisses -->
  <img src="/portal" style="display:none" alt="">
</body>
</html>
