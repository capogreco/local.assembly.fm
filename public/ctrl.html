<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ctrl — local.assembly.fm</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a; color: #e0e0e0;
      font-family: "IBM Plex Mono", "Fira Mono", "Courier New", monospace;
      height: 100dvh; overflow: hidden;
      -webkit-user-select: none; user-select: none;
    }
    canvas { position: fixed; inset: 0; width: 100%; height: 100%; cursor: default; }
    #tooltip {
      position: fixed; background: #333; color: #ccc;
      font-family: "IBM Plex Mono", "Fira Mono", "Courier New", monospace;
      font-size: 11px; padding: 6px 8px; max-width: 280px; line-height: 1.4;
      pointer-events: none; display: none; z-index: 20;
    }
    #tooltip .tt-name { color: #e0e0e0; }
    #tooltip .tt-type { color: #888; }
    #box-input {
      position: fixed; background: transparent; border: none; outline: none;
      color: #e0e0e0; font-family: "IBM Plex Mono", "Fira Mono", "Courier New", monospace;
      font-size: 12px; padding: 0; display: none; z-index: 10;
      box-sizing: border-box;
    }
    /* Help popup */
    #help-popup {
      position: fixed;
      top: 50px; right: 50px;
      width: 600px; height: 450px;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 4px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      z-index: 1000;
      display: flex;
      flex-direction: column;
    }
    #help-popup.hidden { display: none; }
    .help-titlebar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: #252525;
      border-bottom: 1px solid #333;
      cursor: move;
      user-select: none;
    }
    .help-title { color: #aaa; font-size: 13px; }
    .help-close {
      background: none;
      border: none;
      color: #666;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
    }
    .help-close:hover { color: #fff; }
    #help-canvas {
      flex: 1;
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <input id="box-input" type="text" autocomplete="off" spellcheck="false">
  <div id="tooltip"></div>
  <script src="engine-factory.js"></script>
  <script type="module" src="ctrl.js"></script>
</body>
</html>
