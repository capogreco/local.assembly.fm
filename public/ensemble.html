<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ensemble — local.assembly.fm</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: "IBM Plex Mono", "Fira Mono", "Courier New", monospace;
      height: 100dvh;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    .gel-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      font-family: "IBM Plex Mono", "Fira Mono", "Courier New", monospace;
    }
    #touch-capture {
      position: fixed;
      inset: 0;
      z-index: 50;
      touch-action: none;
    }
    #touch-capture.hidden { display: none; }
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      background: #1a1a1a;
    }
    #overlay span {
      font-size: 1.4rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #888;
    }
    #overlay.hidden { display: none; }
    #control-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 0.8rem 1rem;
      font-size: 0.85rem;
      color: #666;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      z-index: 5;
    }
    #control-bar button {
      background: none;
      border: 1px solid #444;
      color: #888;
      font-family: inherit;
      font-size: 0.85rem;
      width: 2rem;
      height: 2rem;
      cursor: pointer;
      border-radius: 2px;
    }
    #control-bar button:hover { border-color: #888; color: #ccc; }
    #voice-count {
      min-width: 1.5rem;
      text-align: center;
      color: #aaa;
    }
    #param-display {
      position: fixed; top: 10px; right: 10px;
      font-family: "IBM Plex Mono", monospace; font-size: 11px;
      color: #666; white-space: pre; z-index: 5; text-align: right;
    }
    #status-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0.8rem 1rem;
      font-size: 0.75rem;
      color: #555;
      display: flex;
      justify-content: space-between;
      letter-spacing: 0.1em;
      z-index: 5;
    }
    #status-bar.connected { color: #666; }
    #status-bar.disconnected { color: #444; }
  </style>
</head>
<body>
  <div id="gel-stack"></div>
  <div id="touch-capture" class="hidden"></div>
  <div id="overlay">
    <span>tap to start</span>
  </div>
  <div id="control-bar">
    <button id="btn-minus">&minus;</button>
    <span id="voice-count">6</span>
    <button id="btn-plus">+</button>
  </div>
  <div id="param-display"></div>
  <div id="status-bar" class="disconnected">
    <span id="conn-status">disconnected</span>
    <span id="client-count"></span>
  </div>
  <script src="graph-core.js"></script>
  <script src="graph.js"></script>
  <script src="engine-factory.js"></script>
  <script src="connection.js"></script>
  <script src="scope.js"></script>
  <script src="main.js"></script>
</body>
</html>
