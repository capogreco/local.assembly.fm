services:
  mongo:
    image: mongo:7.0
    container_name: unifi-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro

  unifi:
    image: linuxserver/unifi-network-application
    container_name: unifi
    depends_on:
      - mongo
    environment:
      - PUID=1000
      - PGID=1000
      - MONGO_HOST=unifi-mongo
      - MONGO_PORT=27017
      - MONGO_DBNAME=unifi
      - MONGO_USER=unifi
      - MONGO_PASS=unifi
      - MONGO_AUTHSOURCE=admin
    ports:
      - "8443:8443"
      - "8080:8080"
      - "3478:3478/udp"
      - "10001:10001/udp"
    volumes:
      - unifi-data:/config
    restart: unless-stopped

volumes:
  mongo-data:
  unifi-data:
